[package]
name = "mono-server"
version = "0.1.0"
description = "Ashscript monolithic game server: simulation engine and client websocket gateway"
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
ashscript-types = { workspace = true }
axum = { workspace = true, features = ["ws"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
socketioxide = { workspace = true }
tokio = { workspace = true }
hashbrown = { workspace = true }
hexx = { workspace = true }
enum-map = { workspace = true }
glam = { workspace = true }
uuid = { workspace = true }
libnoise = { workspace = true }
enum-iterator = { workspace = true }
postcard = { workspace = true }
hecs = { workspace = true }
rand = { workspace = true }
axum-extra = { version = "0.9.4", features = ["tracing", "typed-header"] }
headers = "0.4"
tokio-tungstenite = "0.24.0"
base64 = "0.22.1"
dotenvy = "0.15.7"
